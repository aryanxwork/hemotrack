services:
  - type: web
    name: hemotrack-api
    env: node
    plan: free
    rootDir: hemotrack-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hemotrack-db
          property: connectionString
      - key: PORT
        value: 5000

databases:
  - name: hemotrack-db
    plan: free
